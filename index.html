<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/svg+xml" href="/vite-dark.svg" media="(prefers-color-scheme: dark)" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <!-- user-scalable=no removed: blocking pinch zoom fails WCAG 1.4.4 on
         Android; maximum-scale=1 kept to avoid iOS auto-zoom on input focus -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover"
    />
    <title>GoNuts</title>
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="GoNuts" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon-180x180.png" />
    <meta name="theme-color" content="#FAF6EF" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1A1714" media="(prefers-color-scheme: dark)" />
    <style>
      /* Critical CSS for initial loading state */
      #app-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        height: 100dvh;
        padding-top: env(safe-area-inset-top, 0px);
        padding-bottom: env(safe-area-inset-bottom, 0px);
        font-family: 'Bricolage Grotesque', system-ui, -apple-system, sans-serif;
        background: #FAF6EF;
        color: #1A1714;
        box-sizing: border-box;
      }
      @media (prefers-color-scheme: dark) {
        #app-loading {
          background: #1A1714;
          color: #FAF6EF;
        }
      }
      #app-loading .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #E7E0D2;
        border-top-color: #E66A3C;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      #app-loading p {
        margin-top: 16px;
        font-size: 14px;
        opacity: 0.7;
      }
      #app-error {
        display: none;
        padding: 20px;
        max-width: 400px;
        margin: 50px auto;
        text-align: center;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #app-error.show {
        display: block;
      }
      #app-error h2 {
        color: #ef4444;
        margin-bottom: 10px;
      }
      #app-error pre {
        text-align: left;
        background: #f3f4f6;
        padding: 10px;
        border-radius: 4px;
        overflow: auto;
        font-size: 12px;
      }
      #app-error button {
        margin-top: 16px;
        padding: 8px 16px;
        background: #3b82f6;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div id="app-loading">
        <div class="spinner"></div>
        <p>Loading...</p>
      </div>
    </div>
    <div id="app-error">
      <h2>Something went wrong</h2>
      <p id="error-message"></p>
      <pre id="error-stack"></pre>
      <button id="error-reload">Reload</button>
    </div>
    <script src="/boot-error.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
